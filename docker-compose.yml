services:

  # ZOOKEEPER - Coordinateur dont Kafka a besoin pour fonctionner
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  # KAFKA - File d'attente pour les données temps réel de l'API JCDecaux
  kafka:
    image: confluentinc/cp-kafka:7.0.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # NAMENODE - Le chef de HDFS, sait où sont stockés tous les fichiers
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
    volumes:
      - ./mapreduce:/opt/mapreduce
      - ./data:/opt/data
    restart: unless-stopped

  # DATANODE - Stocke les données réelles de HDFS
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode
    restart: unless-stopped

  # RESOURCEMANAGER - Distribue et planifie les jobs MapReduce
  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "8088:8088"
    depends_on:
      - namenode
    restart: unless-stopped

  # NODEMANAGER - Exécute les mappers et reducers
  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    volumes:
      - ./mapreduce:/opt/mapreduce
      - ./data:/opt/data
    depends_on:
      - resourcemanager
    restart: unless-stopped

  # HIVE - SQL sur HDFS
  hive-server:
    image: apache/hive:3.1.3
    container_name: hive-server
    depends_on:
      - namenode
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_SERVER2_THRIFT_PORT: 10000
      IS_RESUME: "true"
      DB_DRIVER: derby
      SERVICE_OPTS: >-
        -Dfs.defaultFS=hdfs://namenode:9000
        -Dhadoop.proxyuser.root.hosts=*
        -Dhadoop.proxyuser.root.groups=*
        -Dhadoop.proxyuser.hive.hosts=*
        -Dhadoop.proxyuser.hive.groups=*
        -Dhive.metastore.schema.verification=false
        -Ddatanucleus.schema.autoCreateAll=true
        -Dhive.metastore.uris=
    ports:
      - "10000:10000"
      - "10002:10002"
    restart: unless-stopped

  # ATLAS - Gouvernance et traçabilité des données (UI: localhost:21000 admin/admin)
  atlas:
    image: sburn/apache-atlas:2.3.0
    container_name: atlas
    ports:
      - "21000:21000"
    restart: unless-stopped

